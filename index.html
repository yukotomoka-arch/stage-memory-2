<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>REC</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    overflow:hidden;
}

#start{
    position:relative;
    height:100vh;
    width:100vw;
}

.topbar{
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
    letter-spacing:0.15em;
    opacity:.8;
}

.rec-indicator{
    color:red;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}

.viewfinder{
    position:absolute;
    inset:60px 30px 120px 30px;
}

.corner{
    position:absolute;
    width:35px;
    height:35px;
}

.tl{
    top:0;
    left:0;
    border-top:2px solid white;
    border-left:2px solid white;
}

.tr{
    top:0;
    right:0;
    border-top:2px solid white;
    border-right:2px solid white;
}

.bl{
    bottom:0;
    left:0;
    border-bottom:2px solid white;
    border-left:2px solid white;
}

.br{
    bottom:0;
    right:0;
    border-bottom:2px solid white;
    border-right:2px solid white;
}

.message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    opacity:.6;
    font-size:15px;
    line-height:1.8;
    letter-spacing:.1em;
}

#recButton{
    position:absolute;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    background:none;
    border:none;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
}

.dot{
    width:80px;
    height:80px;
    border-radius:50%;
    background:red;
    margin-bottom:12px;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(.9);
        opacity:.7;
    }
}

.label{
    letter-spacing:.2em;
    font-size:14px;
}

video{
    display:none;
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:black;
}

</style>
</head>

<body>

<div id="start">

    <div class="topbar">
        <div><span class="rec-indicator">● REC</span></div>
        <div>CAM 01</div>
    </div>

    <div class="viewfinder">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <div class="message">
        稽古映像を記録します
    </div>

    <button id="recButton">
        <div class="dot"></div>
        <div class="label">REC</div>
    </button>

</div>

<video id="video" playsinline>
    <source src="movie.mp4" type="video/mp4">
</video>

<script>

const start = document.getElementById("start");
const video = document.getElementById("video");
const recButton = document.getElementById("recButton");

recButton.addEventListener("click", () => {

    start.style.display = "none";
    video.style.display = "block";

    video.play();

});

</script>

</body>
</html>
